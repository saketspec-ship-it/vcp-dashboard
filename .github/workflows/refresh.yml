name: Refresh VCP scan

on:
  repository_dispatch:
    types: [refresh]
  workflow_dispatch: {}
  schedule:
    - cron: "40 3 * * *"   # 09:10 IST
    - cron: "30 10 * * *"  # 16:00 IST

# Repeated Refresh-button clicks (each page load resets the button's
# disabled state, so a visitor re-clicking within a minute or two fires a
# genuinely new repository_dispatch) were causing overlapping runs that
# raced each other on `git push` -- the loser failed outright with a
# non-fast-forward rejection and the whole run aborted, including the
# private-repo watchlist sync. This serializes runs instead of letting them
# race: a second trigger while one is in flight queues behind it rather
# than running in parallel.
concurrency:
  group: vcp-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scan (cooldown-protected)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REFRESH_TRIGGER_TOKEN: ${{ secrets.REFRESH_TRIGGER_TOKEN }}
        run: python cloud_scan.py

      - name: Commit and push dashboard
        run: |
          git config user.email "vcp-dashboard-bot@users.noreply.github.com"
          git config user.name "VCP Dashboard Bot"
          git add index.html details previous_scan.json .nojekyll
          git diff --staged --quiet && echo "Nothing to commit (cooldown skip or no changes)" && exit 0
          git commit -m "VCP dashboard refresh (Actions) $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Trigger Pages rebuild
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"

      - name: Checkout private wiki-sync repo
        uses: actions/checkout@v4
        with:
          repository: saketspec-ship-it/trading-wiki-cloud
          token: ${{ secrets.WIKI_SYNC_TOKEN }}
          path: wiki-sync

      - name: Sync watchlist.md to private repo
        continue-on-error: true
        run: |
          if [ ! -f watchlist_export.md ]; then
            echo "No watchlist_export.md this run (cooldown skip) -- nothing to sync."
            exit 0
          fi
          cp watchlist_export.md wiki-sync/watchlist.md
          cd wiki-sync
          git config user.email "vcp-dashboard-bot@users.noreply.github.com"
          git config user.name "VCP Dashboard Bot"
          git add watchlist.md
          git diff --staged --quiet && echo "No watchlist changes" && exit 0
          git commit -m "Watchlist sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
